<!DOCTYPE html>
<html lang="de" data-theme="beige">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logic Organizer</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  /* ---- THEMES ---- */
  :root[data-theme="beige"] {
    --bg: #F8F7F4; --surface: #FFFFFF; --border: #E2E0DA; --text: #1A1917; --muted: #7A7870;
    --green: #1B6B47; --green-light: #EAF4EE;
    --amber: #92600A; --amber-light: #FEF3DC;
    --red: #A8292A; --red-light: #FDEAEA;
    --topbar-bg: #1A1917; --topbar-text: #F8F7F4;
    --hover: #FAFAF8; --table-header: #F5F4F0;
  }
  :root[data-theme="white"] {
    --bg: #FFFFFF; --surface: #FAFAFA; --border: #E5E5E5; --text: #111111; --muted: #6B6B6B;
    --green: #0F5132; --green-light: #E8F2EC;
    --amber: #7A4F00; --amber-light: #FCF0D9;
    --red: #8B1F1F; --red-light: #FBE5E5;
    --topbar-bg: #111111; --topbar-text: #FFFFFF;
    --hover: #F2F2F2; --table-header: #F0F0F0;
  }
  :root[data-theme="dark"] {
    --bg: #0E0E10; --surface: #18181B; --border: #2A2A2E; --text: #F5F5F4; --muted: #8E8E93;
    --green: #4ADE80; --green-light: #14321F;
    --amber: #FACC15; --amber-light: #3B2F08;
    --red: #F87171; --red-light: #3D1414;
    --topbar-bg: #000000; --topbar-text: #F5F5F4;
    --hover: #1F1F23; --table-header: #1A1A1D;
  }
  :root[data-theme="blue"] {
    --bg: #0A1628; --surface: #112138; --border: #1F3654; --text: #E8EEF7; --muted: #8B9AAF;
    --green: #6EE7B7; --green-light: #0F2F22;
    --amber: #FCD34D; --amber-light: #2F260A;
    --red: #FCA5A5; --red-light: #2F1212;
    --topbar-bg: #050D1A; --topbar-text: #E8EEF7;
    --hover: #162B47; --table-header: #0E1D32;
  }

  :root { --mono: 'JetBrains Mono', monospace; --sans: 'DM Sans', sans-serif; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; transition: background 0.25s, color 0.25s; }

  /* TOPBAR */
  .topbar { background: var(--topbar-bg); padding: 12px 48px; display: flex; align-items: center; justify-content: space-between; transition: background 0.25s; position: sticky; top: 0; z-index: 100; }
  .topbar-logo { font-family: var(--mono); font-weight: 700; font-size: 13px; letter-spacing: 0.14em; color: var(--topbar-text); text-transform: uppercase; }
  .topbar-actions { display: flex; align-items: center; gap: 10px; }
  .lang-switcher { display: flex; background: rgba(255,255,255,0.06); border-radius: 6px; padding: 3px; }
  .lang-btn { background: transparent; border: none; color: rgba(255,255,255,0.55); font-family: var(--mono); font-size: 11px; font-weight: 600; letter-spacing: 0.08em; padding: 6px 12px; border-radius: 4px; cursor: pointer; transition: all 0.15s; }
  .lang-btn:hover { color: var(--topbar-text); }
  .lang-btn.active { background: var(--topbar-text); color: var(--topbar-bg); }
  .icon-btn { background: rgba(255,255,255,0.06); border: none; color: rgba(255,255,255,0.7); width: 32px; height: 32px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .icon-btn:hover { background: rgba(255,255,255,0.12); color: var(--topbar-text); }
  .icon-btn svg { width: 16px; height: 16px; }

  /* SEARCH BAR */
  .search-container { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 48px; transition: all 0.25s; }
  .search-box { max-width: 900px; margin: 0 auto; position: relative; }
  .search-input { width: 100%; padding: 10px 14px 10px 38px; border: 1px solid var(--border); background: var(--bg); color: var(--text); border-radius: 8px; font-family: var(--sans); font-size: 13px; outline: none; transition: all 0.15s; }
  .search-input:focus { border-color: var(--text); }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); width: 16px; height: 16px; }
  .search-clear { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); width: 18px; height: 18px; cursor: pointer; display: none; padding: 2px; border-radius: 3px; }
  .search-clear.visible { display: block; }
  .search-clear:hover { background: var(--hover); color: var(--text); }

  /* SETTINGS PANEL */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .overlay.open { opacity: 1; pointer-events: auto; }
  .settings-panel, .qr-panel { position: fixed; top: 60px; right: 48px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 22px; width: 340px; z-index: 1000; box-shadow: 0 12px 48px rgba(0,0,0,0.25); opacity: 0; transform: translateY(-8px); pointer-events: none; transition: all 0.2s ease-out; }
  .settings-panel.open, .qr-panel.open { opacity: 1; transform: translateY(0); pointer-events: auto; }
  .panel-title { font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
  .settings-section { margin-bottom: 18px; }
  .settings-section:last-child { margin-bottom: 0; }
  .settings-section-label { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 10px; }
  .theme-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .theme-option { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: all 0.15s; }
  .theme-option:hover { border-color: var(--muted); }
  .theme-option.active { border-color: var(--text); box-shadow: 0 0 0 2px var(--bg), 0 0 0 3px var(--text); }
  .theme-swatch { width: 28px; height: 28px; border-radius: 5px; border: 1px solid var(--border); flex-shrink: 0; }
  .swatch-beige { background: linear-gradient(135deg, #F8F7F4 50%, #1A1917 50%); }
  .swatch-white { background: linear-gradient(135deg, #FFFFFF 50%, #111111 50%); }
  .swatch-dark  { background: linear-gradient(135deg, #0E0E10 50%, #4ADE80 50%); }
  .swatch-blue  { background: linear-gradient(135deg, #0A1628 50%, #6EE7B7 50%); }
  .theme-label { font-size: 12px; color: var(--text); font-weight: 500; }
  .lang-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .lang-option { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px; cursor: pointer; text-align: center; font-family: var(--mono); font-size: 11px; font-weight: 600; color: var(--text); transition: all 0.15s; }
  .lang-option:hover { border-color: var(--muted); }
  .lang-option.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  .export-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .export-btn { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px; cursor: pointer; font-size: 12px; color: var(--text); font-weight: 500; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .export-btn:hover { background: var(--hover); border-color: var(--muted); }
  .export-btn svg { width: 13px; height: 13px; }

  /* QR PANEL */
  .qr-panel { width: 280px; text-align: center; }
  .qr-code-wrap { background: white; padding: 16px; border-radius: 8px; display: inline-block; margin: 10px 0; }
  #qrcode img, #qrcode canvas { display: block; }
  .qr-url { font-family: var(--mono); font-size: 10px; color: var(--muted); word-break: break-all; margin-top: 8px; padding: 8px; background: var(--bg); border-radius: 5px; }

  /* HERO */
  .hero { background: var(--surface); border-bottom: 1px solid var(--border); padding: 56px 48px 44px; transition: background 0.25s, border-color 0.25s; }
  .hero-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; margin-bottom: 18px; }
  .hero-title { font-size: clamp(30px, 4vw, 50px); font-weight: 300; letter-spacing: -0.025em; line-height: 1.08; margin-bottom: 14px; }
  .hero-title strong { font-weight: 600; }
  .hero-sub { font-size: 14px; color: var(--muted); max-width: 560px; line-height: 1.6; }

  .main { max-width: 900px; margin: 0 auto; padding: 52px 48px 96px; display: grid; gap: 44px; }
  .section { transition: opacity 0.2s; }
  .section.hidden { display: none; }

  .section-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; display: flex; align-items: center; gap: 12px; }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* FORMULA */
  .formula-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 26px 28px 20px; transition: background 0.25s, border-color 0.25s; }
  .formula-parts { display: flex; align-items: center; flex-wrap: wrap; gap: 4px; margin-bottom: 16px; }
  .fp { font-family: var(--mono); font-size: 14px; font-weight: 600; padding: 7px 13px; border-radius: 5px; }
  .fp-type { background: var(--green-light); color: var(--green); }
  .fp-num  { background: var(--amber-light); color: var(--amber); }
  .fp-sep  { background: transparent; color: var(--muted); padding: 7px 3px; font-weight: 400; font-size: 16px; }
  .fp-ver  { background: var(--red-light); color: var(--red); }
  .formula-legend { display: flex; gap: 20px; flex-wrap: wrap; padding-top: 14px; border-top: 1px solid var(--border); }
  .fl-item { display: flex; align-items: center; gap: 7px; font-size: 11px; color: var(--muted); }
  .fl-dot { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }

  /* LEGEND */
  .legend-table { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; transition: background 0.25s, border-color 0.25s; }
  .legend-row { display: grid; grid-template-columns: 52px 1fr; border-bottom: 1px solid var(--border); transition: background 0.12s; }
  .legend-row:last-child { border-bottom: none; }
  .legend-row:hover { background: var(--hover); }
  .legend-key { font-family: var(--mono); font-weight: 700; font-size: 14px; color: var(--green); padding: 15px 0 15px 22px; display: flex; align-items: center; border-right: 1px solid var(--border); }
  .legend-desc { padding: 15px 22px; font-size: 13px; color: var(--text); display: flex; align-items: center; }

  /* VERSIONS */
  .version-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .version-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 22px 24px; transition: background 0.25s, border-color 0.25s; }
  .version-card-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .vc-code { font-family: var(--mono); font-size: 13px; font-weight: 700; }
  .vc-badge { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 3px 9px; border-radius: 3px; }
  .vc-badge-obj { background: var(--amber-light); color: var(--amber); }
  .vc-badge-ver { background: var(--red-light); color: var(--red); }
  .vc-desc { font-size: 12px; color: var(--muted); line-height: 1.65; margin-bottom: 12px; }
  .vc-examples { display: flex; flex-direction: column; gap: 5px; padding-top: 12px; border-top: 1px solid var(--border); }
  .vc-ex { font-family: var(--mono); font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 8px; }
  .vc-ex strong { color: var(--text); font-weight: 600; }
  .vc-arrow { color: var(--border); }

  /* WORKFLOW DIAGRAM */
  .workflow-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 32px 24px; transition: background 0.25s, border-color 0.25s; }
  .workflow { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .wf-node { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px 20px; font-size: 13px; color: var(--text); text-align: center; min-width: 220px; max-width: 380px; font-weight: 500; }
  .wf-node.start { background: var(--text); color: var(--bg); border-color: var(--text); font-weight: 600; }
  .wf-node.question { background: var(--amber-light); border-color: var(--amber); color: var(--amber); font-weight: 600; }
  .wf-arrow { color: var(--muted); font-size: 18px; line-height: 1; }
  .wf-branch { display: flex; gap: 40px; flex-wrap: wrap; justify-content: center; }
  .wf-side { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .wf-label { font-family: var(--mono); font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
  .wf-result { background: var(--green-light); color: var(--green); border-color: var(--green); font-weight: 600; font-family: var(--mono); font-size: 12px; }
  .wf-result.red { background: var(--red-light); color: var(--red); border-color: var(--red); }

  /* EXAMPLES */
  .proj-input-row { display: flex; align-items: center; gap: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px 22px; margin-bottom: 12px; flex-wrap: wrap; transition: background 0.25s, border-color 0.25s; }
  .proj-label { font-family: var(--mono); font-size: 11px; letter-spacing: 0.05em; color: var(--muted); white-space: nowrap; }
  #projInput { font-family: var(--mono); font-size: 14px; font-weight: 700; color: var(--amber); background: var(--amber-light); border: 1px solid var(--amber); border-radius: 5px; padding: 7px 14px; outline: none; width: 180px; letter-spacing: 0.05em; transition: all 0.15s; }
  #projInput:focus { box-shadow: 0 0 0 3px var(--amber-light); }
  .proj-hint { font-size: 11px; color: var(--muted); font-style: italic; }

  .examples-table { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; transition: background 0.25s, border-color 0.25s; }
  .ex-header { display: grid; grid-template-columns: 240px 1fr 50px; background: var(--table-header); border-bottom: 1px solid var(--border); padding: 10px 22px; }
  .ex-header span { font-family: var(--mono); font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); }
  .ex-row { display: grid; grid-template-columns: 240px 1fr 50px; border-bottom: 1px solid var(--border); transition: background 0.12s; padding: 0 22px; align-items: center; }
  .ex-row:last-child { border-bottom: none; }
  .ex-row:hover { background: var(--hover); }
  .ex-code { font-family: var(--mono); font-size: 12px; font-weight: 700; color: var(--green); padding: 14px 20px 14px 0; border-right: 1px solid var(--border); display: flex; align-items: center; cursor: pointer; transition: color 0.15s; }
  .ex-code:hover { opacity: 0.7; }
  .ex-desc { padding: 14px 0 14px 20px; font-size: 12px; color: var(--muted); display: flex; align-items: center; }
  .copy-btn { background: transparent; border: none; padding: 6px; cursor: pointer; color: var(--muted); border-radius: 4px; transition: all 0.15s; display: flex; align-items: center; justify-content: center; }
  .copy-btn:hover { background: var(--hover); color: var(--text); }
  .copy-btn svg { width: 14px; height: 14px; }
  .copy-btn.copied { color: var(--green); }

  /* CHANGELOG */
  .changelog-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; transition: background 0.25s, border-color 0.25s; }
  .cl-entry { display: grid; grid-template-columns: 130px 1fr; border-bottom: 1px solid var(--border); padding: 16px 22px; }
  .cl-entry:last-child { border-bottom: none; }
  .cl-date { font-family: var(--mono); font-size: 11px; color: var(--muted); display: flex; flex-direction: column; gap: 4px; }
  .cl-version { background: var(--green-light); color: var(--green); padding: 2px 8px; border-radius: 3px; font-weight: 700; display: inline-block; width: fit-content; }
  .cl-changes { font-size: 13px; color: var(--text); }
  .cl-changes ul { list-style: none; padding: 0; }
  .cl-changes li { padding: 3px 0; padding-left: 14px; position: relative; color: var(--muted); }
  .cl-changes li::before { content: '→'; position: absolute; left: 0; color: var(--green); font-weight: 700; }

  /* TOAST */
  .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--text); color: var(--bg); padding: 12px 20px; border-radius: 8px; font-size: 13px; font-weight: 500; opacity: 0; pointer-events: none; transition: all 0.25s ease-out; z-index: 2000; box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  footer { border-top: 1px solid var(--border); padding: 20px 48px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--muted); font-family: var(--mono); background: var(--surface); transition: background 0.25s, border-color 0.25s; }

  @media (max-width: 640px) {
    .topbar, .hero, .main, footer, .search-container { padding-left: 20px; padding-right: 20px; }
    .topbar { flex-direction: column; gap: 10px; }
    .settings-panel, .qr-panel { right: 20px; left: 20px; width: auto; }
    .version-grid { grid-template-columns: 1fr; }
    .ex-header, .ex-row { grid-template-columns: 1fr 50px; }
    .ex-code { border-right: none; border-bottom: 1px solid var(--border); grid-column: 1 / 3; padding-right: 0; }
    .ex-desc { padding-left: 0; grid-column: 1; }
    .cl-entry { grid-template-columns: 1fr; gap: 10px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">Logic Organizer</div>
  <div class="topbar-actions">
    <div class="lang-switcher">
      <button class="lang-btn active" data-lang="de" onclick="setLang('de')">DE</button>
      <button class="lang-btn" data-lang="fr" onclick="setLang('fr')">FR</button>
      <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" data-lang="it" onclick="setLang('it')">IT</button>
    </div>
    <button class="icon-btn" onclick="toggleQR()" title="QR Code">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        <line x1="14" y1="14" x2="14" y2="17"/><line x1="14" y1="20" x2="14" y2="21"/>
        <line x1="17" y1="14" x2="21" y2="14"/><line x1="20" y1="17" x2="21" y2="17"/>
        <line x1="17" y1="17" x2="17" y2="21"/><line x1="20" y1="20" x2="21" y2="20"/>
      </svg>
    </button>
    <button class="icon-btn" onclick="window.print()" title="Print">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/>
      </svg>
    </button>
    <button class="icon-btn" onclick="toggleSettings()" title="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>
</div>

<div class="search-container">
  <div class="search-box">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>

function closeAllPanels() {
  document.getElementById('settingsPanel').classList.remove('open');
  document.getElementById('qrPanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

function toggleSettings() {
  const panel = document.getElementById('settingsPanel');
  const wasOpen = panel.classList.contains('open');
  closeAllPanels();
  if (!wasOpen) {
    panel.classList.add('open');
    document.getElementById('overlay').classList.add('open');
  }
}

function toggleQR() {
  const panel = document.getElementById('qrPanel');
  const wasOpen = panel.classList.contains('open');
  closeAllPanels();
  if (!wasOpen) {
    panel.classList.add('open');
    document.getElementById('overlay').classList.add('open');
    renderQR();
  }
}

function renderQR() {
  const url = window.location.href;
  document.getElementById('qrUrl').textContent = url;
  const container = document.getElementById('qrcode');
  container.innerHTML = '';
  new QRCode(container, { text: url, width: 200, height: 200, colorDark: '#000', colorLight: '#fff' });
}

function setTheme(theme) {
  currentTheme = theme;
  document.documentElement.setAttribute('data-theme', theme);
  document.querySelectorAll('.theme-option').forEach(el => {
    el.classList.toggle('active', el.dataset.theme === theme);
  });
  localStorage.setItem('logicOrgTheme', theme);
}

  document.getElementById('flType').textContent = t.flType;
  document.getElementById('flNum').textContent = t.flNum;
  document.getElementById('flVer').textContent = t.flVer;

  const legendHtml = t.legend.map(([k, d]) =>
    `<div class="legend-row"><div class="legend-key">${k}</div><div class="legend-desc">${d}</div></div>`
  ).join('');
  document.getElementById('legendTable').innerHTML = legendHtml;

  document.getElementById('badgeObj').textContent = t.badgeObj;
  document.getElementById('badgeVer').textContent = t.badgeVer;
  document.getElementById('descObj').textContent = t.descObj;
  document.getElementById('descVer').textContent = t.descVer;
  document.getElementById('exObj1').textContent = t.exObj1;
  document.getElementById('exObj2').textContent = t.exObj2;
  document.getElementById('exVer1').textContent = t.exVer1;
  document.getElementById('exVer2').textContent = t.exVer2;
  document.getElementById('projLabel').textContent = t.projLabel;
  document.getElementById('projHint').textContent = t.projHint;
  document.getElementById('hdrCode').textContent = t.hdrCode;
  document.getElementById('hdrDesc').textContent = t.hdrDesc;

  t.examples.forEach((desc, i) => {
    document.getElementById('exd' + (i+1)).textContent = desc;
  });

  document.getElementById('wfStart').textContent = t.wfStart;
  document.getElementById('wfQuestion').textContent = t.wfQuestion;
  document.getElementById('wfYesLbl').textContent = t.wfYesLbl;
  document.getElementById('wfNoLbl').textContent = t.wfNoLbl;
  document.getElementById('wfYesDesc').textContent = t.wfYesDesc;
  document.getElementById('wfNoDesc').textContent = t.wfNoDesc;

  const changelogHtml = t.changelog.map(e => `
    <div class="cl-entry">
      <div class="cl-date"><span class="cl-version">${e.version}</span><span>${e.date}</span></div>
      <div class="cl-changes"><ul>${e.changes.map(c => `<li>${c}</li>`).join('')}</ul></div>
    </div>
  `).join('');
  document.getElementById('changelogBox').innerHTML = changelogHtml;

  document.getElementById('settingsTitleEl').textContent = t.settingsTitle;
  document.getElementById('settingsThemeLbl').textContent = t.settingsTheme;
  document.getElementById('settingsLangLbl').textContent = t.settingsLang;
  document.getElementById('settingsExportLbl').textContent = t.settingsExport;
  document.getElementById('qrTitleEl').textContent = t.qrTitle;
  document.getElementById('searchInput').placeholder = t.searchPlaceholder;
  document.querySelectorAll('[data-theme-name]').forEach(el => {
    el.textContent = t.themeNames[el.dataset.themeName];
  });

  updateExamples();
  localStorage.setItem('logicOrgLang', lang);
}

function updateExamples() {
  const num = document.getElementById('projInput').value || '________';
  templates.forEach(t => {
    document.getElementById(t.id).textContent = t.prefix + num + t.suffix;
  });
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1600);
}

function copyText(id, sourceEl, btnEl) {
  const text = document.getElementById(id).textContent;
  navigator.clipboard.writeText(text).then(() => {
    showToast('✓ ' + translations[currentLang].copied + ' ' + text);
    if (btnEl) {
      btnEl.classList.add('copied');
      setTimeout(() => btnEl.classList.remove('copied'), 1000);
    }
  });
}

function handleSearch() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  document.getElementById('searchClear').classList.toggle('visible', q.length > 0);
  document.querySelectorAll('.section').forEach(s => {
    if (!q) { s.classList.remove('hidden'); return; }
    const haystack = (s.dataset.search + ' ' + s.textContent).toLowerCase();
    s.classList.toggle('hidden', !haystack.includes(q));
  });
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  handleSearch();
}

function exportPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const t = translations[currentLang];
  const num = document.getElementById('projInput').value;

  doc.setFontSize(20);
  doc.setFont('helvetica', 'bold');
  doc.text('Logic Organizer', 20, 25);
  doc.setFontSize(10);
  doc.setFont('helvetica', 'normal');
  doc.setTextColor(120);
  doc.text(t.heroLabel, 20, 33);

  doc.setTextColor(30);
  doc.setFontSize(12);
  doc.setFont('helvetica', 'bold');
  doc.text(t.lblStructure, 20, 48);
  doc.setFont('courier', 'bold');
  doc.setFontSize(11);
  doc.text('[Type][N° Projet]_[Objet]-[Version]', 20, 56);

  doc.setFont('helvetica', 'bold');
  doc.setFontSize(12);
  doc.text(t.lblLegend, 20, 72);
  doc.setFontSize(10);
  doc.setFont('helvetica', 'normal');
  let y = 80;
  t.legend.forEach(([k, d]) => {
    doc.setFont('courier', 'bold');
    doc.text(k, 20, y);
    doc.setFont('helvetica', 'normal');
    doc.text('= ' + d, 30, y);
    y += 6;
  });

  y += 6;
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(12);
  doc.text(t.lblExamples + ' — N° ' + num, 20, y);
  y += 8;
  doc.setFontSize(9);
  templates.forEach((tpl, i) => {
    doc.setFont('courier', 'bold');
    doc.text(tpl.prefix + num + tpl.suffix, 20, y);
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(100);
    doc.text(t.examples[i], 90, y);
    doc.setTextColor(30);
    y += 6;
  });

  doc.save('Logic_Organizer_' + num + '.pdf');
  showToast('✓ PDF');
}

function exportExcel() {
  const t = translations[currentLang];
  const num = document.getElementById('projInput').value;

  const data = [
    ['Logic Organizer'],
    [t.heroLabel],
    [],
    [t.lblStructure],
    ['[Type][N° Projet]_[Objet]-[Version]'],
    [],
    [t.lblLegend],
    ...t.legend.map(([k, d]) => [k, d]),
    [],
    [t.lblExamples + ' — N° ' + num],
    [t.hdrCode, t.hdrDesc],
    ...templates.map((tpl, i) => [tpl.prefix + num + tpl.suffix, t.examples[i]])
  ];

  const ws = XLSX.utils.aoa_to_sheet(data);
  ws['!cols'] = [{ wch: 30 }, { wch: 50 }];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Logic Organizer');
  XLSX.writeFile(wb, 'Logic_Organizer_' + num + '.xlsx');
  showToast('✓ Excel');
}

const savedLang = localStorage.getItem('logicOrgLang') || 'de';
const savedTheme = localStorage.getItem('logicOrgTheme') || 'beige';
setTheme(savedTheme);
setLang(savedLang);
</script>
</body>
